
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberVault | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* تصميم البطاقة تماماً مثل الصورة */
        .premium-card {
            background: linear-gradient(135deg, #1a0505 0%, #000000 100%);
            border: 1px solid #4a0000;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-chip {
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%);
            border-radius: 8px;
            opacity: 0.8;
            position: relative;
        }

        .card-number {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.25em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .cyber-btn {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .cyber-btn:hover {
            background: #ff0000;
            border-color: #ff0000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto mt-10">
        <div class="premium-card p-8">
            <div class="flex justify-between items-start mb-12">
                <div class="flex flex-col">
                    <span class="text-red-600 font-bold tracking-widest text-lg italic">PREMIUM AGENT</span>
                    <span class="text-[10px] text-gray-500">CYBERVAULT ACCESS</span>
                </div>
                <div class="card-chip"></div>
            </div>

            <div class="mt-8">
                <h2 class="card-number text-2xl md:text-3xl text-center font-bold mb-8">
                    4499 8734 5138 5412
                </h2>

                <div class="flex justify-between items-end text-[10px] text-gray-500">
                    <div>
                        <p class="mb-1">CVV</p>
                        <p class="text-white text-base font-mono">925</p>
                    </div>
                    <div class="text-center">
                        <p class="mb-1">EXPIRY</p>
                        <p class="text-white text-base font-mono">12/29</p>
                    </div>
                    <div class="text-left">
                        <p class="mb-1">CARD HOLDER</p>
                        <p class="text-white text-base font-mono uppercase tracking-wider">YASSERBH372</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-4 right-8">
                <p class="text-red-500 text-xl font-bold">PTS <span class="text-white">750</span></p>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-16">
        <h2 class="text-xl font-bold border-r-4 border-red-600 pr-3 mb-8">الأدوات المتاحة</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="cyber-btn p-5 rounded-2xl flex flex-col items-center">
                <img src="https://img.icons8.com/nolan/64/security-configuration.png" class="mb-4 w-12">
                <h3 class="font-bold text-lg">SOLX OSINT</h3>
                <p class="text-xs text-gray-500 mb-4 text-center">نظام الاستخبارات المتقدم</p>
                <button class="w-full bg-white text-black text-xs font-bold py-2 rounded-lg">شراء (250 PTS)</button>
            </div>

            <div class="cyber-btn p-5 rounded-2xl flex flex-col items-center">
                <img src="https://img.icons8.com/nolan/64/data-encryption.png" class="mb-4 w-12">
                <h3 class="font-bold text-lg">IPGRAM V3</h3>
                <p class="text-xs text-gray-500 mb-4 text-center">سحب بيانات الـ IP</p>
                <button class="w-full bg-white text-black text-xs font-bold py-2 rounded-lg">شراء (150 PTS)</button>
            </div>
            
            </div>
    </div>

    <footer class="mt-20 text-center py-6 border-t border-zinc-900">
        <p class="text-gray-600 text-xs italic tracking-widest">
            RIGHTS RESERVED @CyberVault<br>
            DEVELOPER: @wxl_e ~ @tofnne
        </p>
    </footer>

</body>
</html>
