<!DOCTYPE html>
<html lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <title>CyberVault | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .premium-card { transition: all 0.5s ease; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .cyber-btn { background: #111; border: 1px solid #333; transition: 0.3s; }
        .cyber-btn:hover { border-color: #ff0000; transform: scale(1.02); }
    </style>
</head>
<body class="bg-[#050505] text-white p-4 font-sans">

    <div class="flex justify-end gap-2 mb-6">
        <button onclick="setLang('ar')" class="text-xs bg-zinc-800 px-3 py-1 rounded">AR</button>
        <button onclick="setLang('en')" class="text-xs bg-zinc-800 px-3 py-1 rounded">EN</button>
        <button onclick="setLang('ru')" class="text-xs bg-zinc-800 px-3 py-1 rounded">RU</button>
    </div>

    <div id="userCard" class="max-w-md mx-auto premium-card p-8 mb-10" style="background: {{ user[6] }};">
        <div class="flex justify-between items-start mb-10">
            <h1 class="text-red-600 font-bold italic" id="txt-agent">PREMIUM AGENT</h1>
            <input type="color" onchange="changeColor(this.value)" value="{{ user[6] }}" class="w-8 h-8 bg-transparent border-none cursor-pointer">
        </div>
        <h2 class="text-2xl text-center font-mono tracking-widest mb-10">{{ user[3] }}</h2>
        <div class="flex justify-between text-[10px] text-gray-400">
            <div><p>CVV</p><p class="text-white text-sm">{{ user[4] }}</p></div>
            <div><p id="txt-points">POINTS</p><p class="text-white text-sm">{{ user[5] }}</p></div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="cyber-btn p-4 rounded-xl text-center">
            <h3 class="font-bold">IPGRAM V3</h3>
            <button onclick="buy('IPGRAM')" class="mt-4 bg-white text-black text-[10px] px-4 py-2 rounded font-bold">150 PTS</button>
        </div>
        <div class="cyber-btn p-4 rounded-xl text-center">
            <h3 class="font-bold">SOLX OSINT</h3>
            <button onclick="buy('SOLX')" class="mt-4 bg-white text-black text-[10px] px-4 py-2 rounded font-bold">250 PTS</button>
        </div>
        <div class="cyber-btn p-4 rounded-xl text-center">
            <h3 class="font-bold">DDOS V2</h3>
            <button onclick="buy('DDOS_V2')" class="mt-4 bg-white text-black text-[10px] px-4 py-2 rounded font-bold">150 PTS</button>
        </div>
        <div class="cyber-btn p-4 rounded-xl text-center">
            <h3 class="font-bold">BLACK WINDOW</h3>
            <button onclick="buy('BLACK_WINDOW')" class="mt-4 bg-white text-black text-[10px] px-4 py-2 rounded font-bold">200 PTS</button>
        </div>
        <div class="cyber-btn p-4 rounded-xl text-center border-yellow-900">
            <h3 class="text-yellow-500 font-bold" id="txt-course-h">Hacking Course</h3>
            <button onclick="buy('C_HACKING')" class="mt-4 bg-yellow-600 text-white text-[10px] px-4 py-2 rounded font-bold">300 PTS</button>
        </div>
    </div>

    <script>
        const langData = {
            ar: { agent: "عميل مميز", points: "النقاط", buy: "تم الشراء بنجاح" },
            en: { agent: "PREMIUM AGENT", points: "POINTS", buy: "Purchase Successful" },
            ru: { agent: "ПРЕМИУМ АГЕНТ", points: "БАЛЛЫ", buy: "Покупка прошла успешно" }
        };

        function setLang(l) {
            document.getElementById('txt-agent').innerText = langData[l].agent;
            document.getElementById('txt-points').innerText = langData[l].points;
            document.getElementById('mainHtml').dir = (l === 'ar' ? 'rtl' : 'ltr');
        }

        async function changeColor(color) {
            document.getElementById('userCard').style.background = color;
            await fetch('/update_color', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({color: color})
            });
        }

        async function buy(id) {
            const res = await fetch('/purchase', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({product_id: id})
            });
            const data = await res.json();
            alert(data.message);
            if(data.status === 'success') location.reload();
        }
    </script>
</body>
</html>
